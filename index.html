<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로컬 AI 무제한 번역기</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --primary: #4a90e2;
            --text-color: #333;
            --border: #ddd;
        }
        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 900px;
        }
        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 5px;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }
        
        /* 프로그레스 바 UI 스타일 추가 */
        .progress-container {
            display: none; /* 초기에는 숨김 */
            background-color: #f0f0f0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
        }
        progress {
            width: 100%;
            height: 10px;
            border-radius: 5px;
            margin-bottom: 8px;
        }
        progress::-webkit-progress-bar {
            background-color: #ddd;
            border-radius: 5px;
        }
        progress::-webkit-progress-value {
            background-color: var(--primary);
            border-radius: 5px;
        }
        #progress-text {
            font-size: 0.9rem;
            color: #555;
            word-break: break-all;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        select, button {
            padding: 12px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 1rem;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
            min-width: 150px;
        }
        button:hover {
            background-color: #357abd;
        }
        button:disabled {
            background-color: #a0c4e8;
            cursor: not-allowed;
        }
        .panels {
            display: flex;
            gap: 20px;
            flex-direction: column;
        }
        @media(min-width: 768px) {
            .panels { flex-direction: row; }
        }
        textarea {
            flex: 1;
            min-height: 250px;
            padding: 15px;
            border: 1px solid var(--border);
            border-radius: 8px;
            resize: vertical;
            font-size: 1.05rem;
            line-height: 1.6;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        #status {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
            color: #d9534f;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>로컬 AI 번역기 🌍</h1>
        <p class="subtitle">서버 전송 없이 브라우저에서 직접 구동됩니다. 무제한으로 안전하게 번역하세요.</p>
        
        <!-- 진행률 표시 영역 -->
        <div id="progressContainer" class="progress-container">
            <progress id="progressBar" max="100" value="0"></progress>
            <div id="progressText">모델 다운로드를 준비 중입니다...</div>
        </div>

        <div class="controls">
            <select id="direction">
                <option value="en2ko">영어 ➔ 한국어</option>
                <option value="ko2en">한국어 ➔ 영어</option>
            </select>
            <button id="translateBtn" disabled>모델 로딩 중...</button>
        </div>

        <div class="panels">
            <textarea id="inputText" placeholder="번역할 내용을 입력하세요. (글자 수 제한 없음)"></textarea>
            <textarea id="outputText" placeholder="번역 결과가 실시간으로 표시됩니다." readonly></textarea>
        </div>
        
        <div id="status">최초 실행 시 AI 모델(약 600MB)을 다운로드하므로 다소 시간이 걸릴 수 있습니다. (이후에는 캐시되어 즉시 실행됨)</div>
    </div>

    <script type="module">
        import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';

        env.allowLocalModels = false;

        const translateBtn = document.getElementById('translateBtn');
        const inputText = document.getElementById('inputText');
        const outputText = document.getElementById('outputText');
        const directionSelect = document.getElementById('direction');
        const statusDiv = document.getElementById('status');
        
        // 프로그레스 관련 요소
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        let translator = null;

        async function loadModel() {
            try {
                // 다운로드 콜백을 추가하여 모델 로드
                translator = await pipeline('translation', 'Xenova/nllb-200-distilled-600M', {
                    progress_callback: (x) => {
                        // 프로그레스 바 영역 표시
                        progressContainer.style.display = 'block';
                        statusDiv.innerText = '필요한 AI 모델 파일을 다운로드하고 있습니다...';
                        statusDiv.style.color = '#f0ad4e';

                        if (x.status === 'initiate') {
                            progressText.innerText = `[대기 중] ${x.file}`;
                        } else if (x.status === 'progress') {
                            progressBar.value = x.progress;
                            progressText.innerText = `[다운로드 중] ${x.file} (${Math.round(x.progress)}%)`;
                        } else if (x.status === 'done') {
                            progressText.innerText = `[완료] ${x.file}`;
                        } else if (x.status === 'ready') {
                            // 모든 다운로드 및 준비 완료
                            progressContainer.style.display = 'none';
                        }
                    }
                });

                translateBtn.innerText = '번역하기';
                translateBtn.disabled = false;
                statusDiv.innerText = '✅ 모델 로딩 완료! 인터넷 없이도 번역이 가능합니다.';
                statusDiv.style.color = '#5cb85c';
            } catch (error) {
                progressContainer.style.display = 'none';
                statusDiv.innerText = '❌ 모델 로딩 실패: ' + error.message;
            }
        }

        const langMap = {
            'en2ko': { src: 'eng_Latn', tgt: 'kor_Hang' },
            'ko2en': { src: 'kor_Hang', tgt: 'eng_Latn' }
        };

        translateBtn.addEventListener('click', async () => {
            const text = inputText.value.trim();
            if (!text) return;

            const dir = directionSelect.value;
            const { src, tgt } = langMap[dir];

            translateBtn.disabled = true;
            translateBtn.innerText = '번역 중...';
            outputText.value = '';
            statusDiv.innerText = '⏳ 번역을 진행하고 있습니다. 잠시만 기다려주세요...';
            statusDiv.style.color = '#f0ad4e';

            try {
                const chunks = text.split('\n');
                let resultText = '';

                for (let i = 0; i < chunks.length; i++) {
                    const chunk = chunks[i].trim();
                    if (chunk === '') {
                        resultText += '\n';
                        continue;
                    }

                    const output = await translator(chunk, {
                        src_lang: src,
                        tgt_lang: tgt,
                    });
                    
                    resultText += output[0].translation_text + '\n';
                    outputText.value = resultText;
                }
                statusDiv.innerText = '✅ 번역이 완료되었습니다.';
                statusDiv.style.color = '#5cb85c';

            } catch (error) {
                statusDiv.innerText = '❌ 번역 중 오류 발생: ' + error.message;
                statusDiv.style.color = '#d9534f';
            } finally {
                translateBtn.disabled = false;
                translateBtn.innerText = '번역하기';
            }
        });

        loadModel();
    </script>
</body>
</html>
